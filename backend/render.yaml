services:
  - type: web
    name: laptopmind-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false   # Set this manually in Render dashboard (use Neon URL)
      - key: PYTHON_VERSION
        value: "3.11.0"
